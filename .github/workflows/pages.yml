name: Publish VERIFRAX proof surface

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf out
          mkdir -p out
          cp CNAME out/CNAME
          cp index.html out/index.html
          cp 404.html out/404.html
          [ -d assets ] && cp -R assets out/assets || true
          [ -d public ] && cp -R public out/public || true
          [ -d surface-system ] && cp -R surface-system out/surface-system || true
          [ -d dist ] && cp -R dist out/dist || true
          test -f out/index.html
          test -f out/404.html
          test -f out/CNAME
          grep -Fx "proof.verifrax.net" out/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
